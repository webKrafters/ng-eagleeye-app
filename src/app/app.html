<div class="app">
  <div>
    <h1>
      <img ngSrc="assets/wklogo-outline.png" alt="wk logo" height="80" width="80" priority />
      <p>
        <span>{{ title }}</span>
        <a
          href="https://www.npmjs.com/package/@webkrafters/ng-eagleeye"
          rel="no-follow"
        >
          Eagle Eye
        </a>
      </p>
    </h1>
    <main>
      <h1>Demo</h1>
      <h2>A contrived product app.</h2>
      <div style="margin-bottom: 10px">
        <label>
          Type:&nbsp;
          <input
            (keyup)="updateType($event)"
            placeholder="override product type here..."
          >
        </label>
      </div>
      <app-product [prehooks]="prehooks()" [type]="productType()" />
    </main>
  </div>
  <footer>
    <span>&copy;2026</span>
    @if( year > 2026 ) {
      <span>-{{ year }} </span>
    }
    {{ ' ' }}
    <a href="https://webkrafters.tech" rel="no-follow">webKrafters</a>. All rights reserved.
  </footer>
</div>
