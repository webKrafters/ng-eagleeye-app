<div style="margin: 20px 0 10px">
	<div style="float: left; font-size: 1.75rem">
		<span>Customer: </span>
		@if( isEmpty( firstName() ) && isEmpty( lastName() ) ) {
			<span>n.a.</span>
		} @else {
			<app-capitalized-display [text]="firstName()" />
			&nbsp;
			<app-capitalized-display [text]="lastName()" />
		}
	</div>
	<div style="clear: both; padding-left: 3px">
		<app-customer-phone-display />
	</div>
	<table>
		<tbody>
			<tr>
				<td><label>Type:</label></td>
				<td>
					<app-capitalized-display [text]="type()" />
				</td>
			</tr>
			<tr>
				<td><label>Color:</label></td>
				<td>
					<app-capitalized-display [text]="color()" />
				</td>
			</tr>
			<tr>
				<td><label>Price:</label></td>
				<td>{{ price() | tofixed : 2 }}</td>
			</tr>
		</tbody>
	</table>
	<div style="text-align: right">
		<app-reset />
	</div>
</div>
